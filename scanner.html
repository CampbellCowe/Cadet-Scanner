<!DOCTYPE html>
<html>
<head>
  <title>Cadet Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="font-family: Arial; text-align:center; padding-top:20px;">

  <h2>Cadet Attendance Scanner</h2>

  <button onclick="startScanner()" style="font-size:18px; padding:10px;">
    Start Scan
  </button>

  <div id="reader" style="width:300px; margin:auto; margin-top:20px;"></div>

  <div id="result" style="margin-top:20px;"></div>

  <script>
    let scanner;

    async function startScanner() {
      try {
        document.getElementById("result").innerHTML = "Starting camera...";

        scanner = new Html5Qrcode("reader");

        // ✅ BEST METHOD: forces rear camera on mobile
        await scanner.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: 250
          },
          qr => {

            scanner.stop();

            document.getElementById("result").innerHTML =
              "Scanned: " + qr;

            sendToSheet(qr);
          }
        );

      } catch (err) {
        document.getElementById("result").innerHTML =
          "Camera error: " + err;
      }
    }

    function sendToSheet(qr) {
      fetch("https://script.google.com/macros/s/AKfycbyvA8slZ2Jy3RlieZ3hfYzNKpdhEDANaSjTPJCthVpO88hhXZ0IM78NKrsI-PnfOUSMwA/exec", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ qr: qr })
      })
      .then(res => res.text())
      .then(() => {
        document.getElementById("result").innerHTML =
          "Attendance logged: " + qr;
      })
      .catch(() => {
        document.getElementById("result").innerHTML =
          "Error sending attendance";
      });
    }
  </script>

</body>
</html>
