<!DOCTYPE html>
<html>
<head>
  <title>Cadet Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="font-family: Arial; text-align:center; padding-top:20px;">

  <h2>Cadet Attendance Scanner</h2>

  <button onclick="startScanner()" style="font-size:18px; padding:10px;">
    Start Scan
  </button>

  <div id="reader" style="width:300px; margin:auto; margin-top:20px;"></div>

  <div id="result" style="margin-top:20px;"></div>

  <script>
    let scanner;
    let lastScan = "";
    let scanCooldown = false;

    async function startScanner() {
      try {
        document.getElementById("result").innerHTML = "Starting camera...";

        const cameras = await Html5Qrcode.getCameras();

        if (!cameras || cameras.length === 0) {
          document.getElementById("result").innerHTML = "No camera found";
          return;
        }

        const cameraId = cameras[cameras.length - 1].id;

        scanner = new Html5Qrcode("reader");

        await scanner.start(
          cameraId,
          {
            fps: 15,
            qrbox: { width: 250, height: 250 },
            videoConstraints: {
              facingMode: "environment",
              focusMode: "continuous"
            }
          },
          qr => {

            // 🔥 prevent duplicate scans
            if (scanCooldown) return;
            if (qr === lastScan) return;

            lastScan = qr;
            scanCooldown = true;

            document.getElementById("result").innerHTML =
              "Scanned: " + qr;

            sendToSheet(qr);

            // cooldown reset
            setTimeout(() => {
              scanCooldown = false;
            }, 2000);
          }
        );

      } catch (err) {
        document.getElementById("result").innerHTML =
          "Camera error: " + err;
      }
    }

    function sendToSheet(qr) {
      fetch("https://script.google.com/macros/s/AKfycbyvA8slZ2Jy3RlieZ3hfYzNKpdhEDANaSjTPJCthVpO88hhXZ0IM78NKrsI-PnfOUSMwA/exec", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ qr: qr })
      })
      .then(res => res.text())
      .then(() => {
        document.getElementById("result").innerHTML =
          "Logged: " + qr;
      })
      .catch(() => {
        document.getElementById("result").innerHTML =
          "Error sending attendance";
      });
    }
  </script>

</body>
</html>
